<!DOCTYPE html>
<html lang="en">
<head meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Dr. Drunk MD</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .calculator {
      max-width: 360px;
      padding: 20px;
      border: 2px solid #333;
      border-radius: 12px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }
    h2 {
      text-align: center;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      background-color: #000;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    .toggles label {
      display: block;
      margin-top: 5px;
    }
    .result {
      margin-top: 15px;
      font-weight: bold;
      font-size: 18px;
    }
    .rating {
      margin-top: 10px;
      font-size: 20px;
    }
  </style>
</head>
<body>

<div class="calculator">
  <h2>🍺 Dr. Drunk MD</h2>

  <label>Ounces:</label>
  <input type="number" id="ounces" placeholder="16">

  <label>ABV (%):</label>
  <input type="number" id="abv" placeholder="6.5">

  <label>Price ($):</label>
  <input type="number" id="price" placeholder="8">

  <div class="toggles">
    <label><input type="checkbox" id="patio"> 🌞 Patio</label>
    <label><input type="checkbox" id="wife"> ❤️ With Wife</label>
    <label><input type="checkbox" id="kids"> 👶 With Kids</label>
    <label><input type="checkbox" id="boyz"> 🍻 With Da Boyz</label>
  </div>

  <button onclick="calculate()">Diagnose</button>

  <div class="result" id="result"></div>
  <div class="rating" id="rating"></div>
</div>

<script>
  function calculate() {
    const oz = parseFloat(document.getElementById('ounces').value);
    const abv = parseFloat(document.getElementById('abv').value);
    const price = parseFloat(document.getElementById('price').value);

    if (isNaN(oz) || isNaN(abv) || isNaN(price) || price === 0) {
      document.getElementById('result').innerHTML = "Enter valid values.";
      document.getElementById('rating').innerHTML = "";
      return;
    }

    let score = (oz * abv) / price;

    // Toggles
    if (document.getElementById('patio').checked) {
      score *= (abv <= 5.5) ? 1.2 : 0.9;
    }

    if (document.getElementById('wife').checked) {
      score *= (abv >= 4 && abv <= 7) ? 1.15 : 0.9;
    }

    if (document.getElementById('kids').checked) {
      score *= (abv > 6) ? 0.7 : 1.1;
    }

    if (document.getElementById('boyz').checked) {
      score *= (abv >= 6.5) ? 1.3 : 0.95;
    }

    // Rating logic
    let rating = "";
    if (score < 8) rating = "Not having fun";
    else if (score < 12) rating = "Meh";
    else if (score < 16) rating = "Now we're talking";
    else if (score < 20) rating = "Drunk cig";
    else rating = "DUI";

    document.getElementById('result').innerHTML =
      `Score: ${score.toFixed(2)}`;

    document.getElementById('rating').innerHTML =
      `Diagnosis: ${rating}`;
  }
</script>

</body>
</html>
