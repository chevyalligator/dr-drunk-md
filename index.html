<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dr. Drunk MD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    padding: 30px;
  }
  .calculator {
    max-width: 360px;
    width: 100%;
    padding: 30px;
    border-radius: 12px;
    background: #fff;
    border: 2px solid #333;
    box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    transition: transform 0.2s ease;
  }
  .calculator:hover {
    transform: translateY(-3px);
  }
  h2 {
    text-align: center;
    margin-bottom: 25px;
  }
  input[type="number"] {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    box-sizing: border-box;
    margin-bottom: 15px;
    transition: border 0.2s ease, box-shadow 0.2s ease;
  }
  input[type="number"]:focus {
    border-color: #2a9d8f;
    box-shadow: 0 0 5px rgba(42,157,143,0.5);
    outline: none;
  }
  button {
    width: 100%;
    padding: 12px;
    margin-top: 25px;
    border-radius: 8px;
    border: none;
    background-color: #000;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.2s ease, transform 0.2s ease;
  }
  button:hover {
    background-color: #2a9d8f;
    transform: translateY(-2px);
  }
  .result {
    margin-top: 15px;
    font-weight: bold;
    font-size: 18px;
  }
  .rating {
    margin-top: 10px;
    font-size: 20px;
    font-weight: bold;
    transition: color 0.2s ease;
  }
  .toggles {
    margin-top: 20px;
  }
  .toggle-container {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-top: 12px;
    font-size: 14px;
    line-height: 1.2;
    transition: box-shadow 0.2s ease, transform 0.2s ease;
    padding: 4px 2px;
    border-radius: 6px;
  }
  .toggle-container:hover {
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    transform: translateX(2px);
  }
  .switch {
    position: relative;
    display: inline-block;
    width: 40px;
    height: 22px;
    margin-top: 2px;
  }
  .switch input { 
    opacity: 0;
    width: 0;
    height: 0;
  }
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #ccc;
    border-radius: 22px;
    transition: .4s;
  }
  .slider:before {
    position: absolute;
    content: "";
    height: 18px; width: 18px;
    left: 2px;
    bottom: 2px;
    background-color: white;
    border-radius: 50%;
    transition: .4s;
  }
  input:checked + .slider {
    background-color: #2a9d8f;
  }
  input:checked + .slider:before {
    transform: translateX(18px);
  }
</style>
</head>
<body>

<div class="calculator">
  <h2>🍺 Dr. Drunk MD</h2>

  <label>Ounces:</label>
  <input type="number" id="ounces" placeholder="16">

  <label>ABV (%):</label>
  <input type="number" id="abv" placeholder="6.5">

  <label>Price ($):</label>
  <input type="number" id="price" placeholder="8">

  <div class="toggles">
    <div class="toggle-container">
      🌞 Patio
      <label class="switch">
        <input type="checkbox" id="patio">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-container">
      ❤️ With Wife
      <label class="switch">
        <input type="checkbox" id="wife">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-container">
      👶 With Kids
      <label class="switch">
        <input type="checkbox" id="kids">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-container">
      🍻 With Da Boyz
      <label class="switch">
        <input type="checkbox" id="boyz">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <button onclick="calculate()">Diagnose</button>

  <div class="result" id="result"></div>
  <div class="rating" id="rating"></div>
</div>

<script>
function calculate() {
  const oz = parseFloat(document.getElementById('ounces').value);
  const abv = parseFloat(document.getElementById('abv').value);
  const price = parseFloat(document.getElementById('price').value);

  if (isNaN(oz) || isNaN(abv) || isNaN(price) || price === 0) {
    document.getElementById('result').innerHTML = "Enter valid values.";
    document.getElementById('rating').innerHTML = "";
    return;
  }

  // Base formula: high ounces + high ABV + low price = positive
  let score = (oz * abv) / price;

  // Context modifiers
  if (document.getElementById('patio').checked) score *= 1.15;
  if (document.getElementById('boyz').checked) score *= 1.25;
  if (document.getElementById('wife').checked) score *= 0.9;
  if (document.getElementById('kids').checked) score *= 0.7;

  // Rating thresholds and color
  let rating = "";
  let color = "";
  if (score < 8) { rating = "Not having fun"; color="#e63946"; }
  else if (score < 12) { rating = "Meh"; color="#f4a261"; }
  else if (score < 16) { rating = "Now we're talking"; color="#f1fa8c"; }
  else if (score < 20) { rating = "Drunk cig"; color="#90be6d"; }
  else { rating = "DUI"; color="#1d3557"; }

  document.getElementById('result').innerHTML = `Score: ${score.toFixed(2)}`;
  const ratingDiv = document.getElementById('rating');
  ratingDiv.innerHTML = `Diagnosis: ${rating}`;
  ratingDiv.style.color = color;
}
</script>

</body>
</html>
